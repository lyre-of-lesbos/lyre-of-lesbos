<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αιολική Άρπα - Λύρα της Λέσβου</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0c;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background-color: #111114;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #3a3528;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
            z-index: 2;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #bba15c;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        h2 {
            margin: 0 0 25px 0;
            color: #666;
            font-size: 0.9rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #8a8a93;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-ambient {
            background: linear-gradient(135deg, #bba15c, #967f43);
            color: #0a0a0c;
            border: none;
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(187, 161, 92, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 1px;
        }
        .btn-ambient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(187, 161, 92, 0.5);
        }
        .btn-stop {
            background: #222;
            color: #bd3a3a;
            border: 1px solid #bd3a3a;
            box-shadow: none;
        }
        #status {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #bba15c;
            font-style: italic;
            height: 20px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌬️ ΑΙΟΛΙΚΟΣ ΑΝΕΜΟΣ</h1>
        <h2>Ήχοι Περιβάλλοντος & Αντήχησης</h2>
        <p>Αφήστε τις 6 γεωδαιτικές συχνότητες του Σκοτεινού Βουνού να συνδυαστούν ελεύθερα. Ο κώδικας δημιουργεί ένα ατέρμονο ηχητικό χαλί (ambient pad) με εφέ αντήχησης, ιδανικό για χαλάρωση.</p>
        
        <button id="actionBtn" class="btn-ambient" onclick="toggleAmbient()">ΑΚΟΥΣΤΕ ΤΟΝ ΑΝΕΜΟ</button>
        
        <div id="status">Ήχος απενεργοποιημένος</div>
    </div>

    <script>
        // Οι 6 συχνότητες της 3ης Λύρας
        const lyreFrequencies = [126.7, 164.7, 220.0, 225.4, 305.6, 458.3];
        
        let audioCtx = null;
        let isPlaying = false;
        let delayNode = null;
        let feedbackNode = null;
        let masterGain = null;
        let activeOscillators = [];

        function toggleAmbient() {
            if (!isPlaying) {
                startAmbient();
            } else {
                stopAmbient();
            }
        }

        function startAmbient() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isPlaying = true;
            
            // 1. Δημιουργία Master Gain για ομαλό έλεγχο έντασης
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 2.0); // Ομαλό fade-in

            // 2. Δημιουργία Εφέ Καθυστέρησης (Delay / Echo) για «βάθος» και «ατμόσφαιρα»
            delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = 0.6; // 600ms καθυστέρηση

            feedbackNode = audioCtx.createGain();
            feedbackNode.gain.value = 0.5; // Πόσο θα κρατάει η ηχώ

            // Σύνδεση του Delay (Feedback Loop)
            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode);

            // 3. Σύνδεση των κόμβων
            masterGain.connect(audioCtx.destination);
            masterGain.connect(delayNode);
            delayNode.connect(audioCtx.destination);

            // Αλλαγή εμφάνισης κουμπιού
            const btn = document.getElementById('actionBtn');
            btn.innerText = 'ΔΙΑΚΟΠΗ ΗΧΟΥ';
            btn.classList.add('btn-stop');
            document.getElementById('status').innerText = 'Ο άνεμος περνά μέσα από τις χορδές...';

            // Ξεκινά η παραγωγή των ατμοσφαιρικών κυμάτων
            triggerWindWave();
        }

        function stopAmbient() {
            isPlaying = false;
            
            if (masterGain) {
                // Ομαλό σβήσιμο του ήχου (Fade-out) για να μην κλείσει απότομα
                masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
                masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
            }

            setTimeout(() => {
                activeOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
                activeOscillators = [];
                
                const btn = document.getElementById('actionBtn');
                btn.innerText = 'ΑΚΟΥΣΤΕ ΤΟΝ ΑΝΕΜΟ';
                btn.classList.remove('btn-stop');
                document.getElementById('status').innerText = 'Ήχος απενεργοποιημένος';
            }, 1500);
        }

        function triggerWindWave() {
            if (!isPlaying) return;

            // Επιλέγει μια τυχαία συχνότητα από τις 6 της λύρας
            const randomIndex = Math.floor(Math.random() * lyreFrequencies.length);
            const freq = lyreFrequencies[randomIndex];

            // Δημιουργία ενός πολύ απαλού ηχητικού κύματος
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();

            // Sine wave (Ημίτονο) για απόλυτα καθαρό και απαλό ήχο, χωρίς αιχμές
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            // Πολύ αργό και ομαλό άναμμα και σβήσιμο της νότας (σαν φύσημα ανέμου)
            const attackTime = 1.5 + Math.random() * 1.5; // 1.5 έως 3 δευτερόλεπτα να δυναμώσει
            const releaseTime = 2.0 + Math.random() * 2.0; // 2 έως 4 δευτερόλεπτα να σβήσει
            const totalDuration = attackTime + releaseTime;

            oscGain.gain.setValueAtTime(0, audioCtx.currentTime);
            oscGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + attackTime);
            oscGain.gain.setValueAtTime(0.08, audioCtx.currentTime + attackTime);
            oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + totalDuration);

            osc.connect(oscGain);
            oscGain.connect(masterGain);

            osc.start();
            osc.stop(audioCtx.currentTime + totalDuration);

            activeOscillators.push(osc);

            // Καθαρισμός μνήμης για τους σταματημένους ταλαντωτές
            setTimeout(() => {
                activeOscillators = activeOscillators.filter(item => item !== osc);
            }, totalDuration * 1000);

            // Προγραμματισμός του επόμενου «κύματος ανέμου» σε τυχαίο χρόνο (κάθε 1 με 2.5 δευτερόλεπτα)
            const nextWaveDelay = 1000 + Math.random() * 1500;
            setTimeout(triggerWindWave, nextWaveDelay);
        }
    </script>
</body>
</html>
