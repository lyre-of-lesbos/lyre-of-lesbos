<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Φυσική Μοντελοποίηση Λύρας (Karplus-Strong)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0a0a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #141312;
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #bba15c;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #bba15c;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        h2 {
            margin: 0 0 25px 0;
            color: #7a7368;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #9e968b;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .lyre-strings-container {
            display: flex;
            justify-content: center;
            gap: 22px;
            background-color: #0d0c0b;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #26221c;
            margin-bottom: 25px;
            height: 180px;
        }
        .string-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            cursor: pointer;
        }
        .string-line {
            width: 2px;
            height: 130px;
            background: linear-gradient(to bottom, #c2ab72, #bba15c, #c2ab72);
            box-shadow: 0 0 3px rgba(187,161,92,0.4);
            transition: transform 0.08s ease;
        }
        .string-wrapper:hover .string-line {
            background: #ffdf00;
            box-shadow: 0 0 8px #ffdf00;
            transform: scaleX(1.8) rotate(0.5deg);
        }
        .string-label {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #7a7368;
            font-weight: bold;
        }
        #sound-btn {
            background: #bba15c;
            color: #121212;
            border: none;
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(187,161,92,0.2);
        }
        #info-box {
            font-size: 0.85rem;
            color: #bba15c;
            font-style: italic;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎸 Ακουστική Μοντελοποίηση Χορδής</h1>
        <h2>Αλγόριθμος Karplus-Strong (Μοντέλο 177.5μ)</h2>
        <p>Πατήστε το κουμπί και **περάστε το ποντίκι (ή κάντε κλικ)** πάνω από τις χορδές. Ο ήχος παράγεται από μαθηματική προσομοίωση φυσικής δόνησης, χωρίς ηλεκτρονικές γεννήτριες.</p>
        
        <button id="sound-btn" onclick="initAudio()">⚡ Ενεργοποίηση Φυσικού Ήχου</button>

        <div class="lyre-strings-container">
            <div class="string-wrapper" onmouseenter="pluckKarplusString(126.7)" onclick="pluckKarplusString(126.7)">
                <div class="string-line" style="width: 4px;"></div><div class="string-label">C3</div>
            </div>
            <div class="string-wrapper" onmouseenter="pluckKarplusString(164.7)" onclick="pluckKarplusString(164.7)">
                <div class="string-line" style="width: 3.5px;"></div><div class="string-label">E3</div>
            </div>
            <div class="string-wrapper" onmouseenter="pluckKarplusString(220.0)" onclick="pluckKarplusString(220.0)">
                <div class="string-line" style="width: 3px;"></div><div class="string-label">A3</div>
            </div>
            <div class="string-wrapper" onmouseenter="pluckKarplusString(225.4)" onclick="pluckKarplusString(225.4)">
                <div class="string-line" style="width: 2.5px;"></div><div class="string-label">As3</div>
            </div>
            <div class="string-wrapper" onmouseenter="pluckKarplusString(305.6)" onclick="pluckKarplusString(305.6)">
                <div class="string-line" style="width: 2px;"></div><div class="string-label">B3</div>
            </div>
            <div class="string-wrapper" onmouseenter="pluckKarplusString(458.3)" onclick="pluckKarplusString(458.3)">
                <div class="string-line" style="width: 1.2px;"></div><div class="string-label">As4</div>
            </div>
        </div>
        
        <div id="info-box">Απαιτείται ενεργοποίηση...</div>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('sound-btn').style.backgroundColor = '#333';
                document.getElementById('sound-btn').style.color = '#aaa';
                document.getElementById('sound-btn').innerText = '✓ Ακουστική Μοντελοποίηση Ενεργή';
                document.getElementById('info-box').innerText = 'Γρατσουνίστε τις χορδές!';
            }
        }

        // Υλοποίηση του αλγορίθμου Karplus-Strong απευθείας στα Samples του Audio Buffer
        function pluckKarplusString(frequency) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.getElementById('info-box').innerText = `Συχνότητα Δόνησης: ${frequency} Hz`;

            const sampleRate = audioCtx.sampleRate;
            const duration = 2.0; // Διάρκεια δόνησης σε δευτερόλεπτα
            const totalSamples = sampleRate * duration;
            
            // Το μέγεθος του buffer (N) καθορίζει τη συχνότητα της χορδής (N = SampleRate / Frequency)
            const N = Math.round(sampleRate / frequency);
            
            // Δημιουργία του τελικού audio buffer για αναπαραγωγή
            const audioBuffer = audioCtx.createBuffer(1, totalSamples, sampleRate);
            const channelData = audioBuffer.getChannelData(0);

            // 1. Γέμισμα των πρώτων N δειγμάτων με Λευκό Θόρυβο (Το χτύπημα της χορδής)
            for (let i = 0; i < N; i++) {
                channelData[i] = Math.random() * 2 - 1;
            }

            // 2. Ο βρόχος Karplus-Strong: Κάθε δείγμα είναι ο μέσος όρος των προηγούμενων, δημιουργώντας απόσβεση
            // y[n] = 0.996 * (y[n-N] + y[n-N-1]) / 2
            const dampingFactor = 0.996; // Έλεγχος του πόσο γρήγορα σβήνει η χορδή
            for (let i = N; i < totalSamples; i++) {
                const currentNoiseValue = channelData[i - N];
                const previousNoiseValue = channelData[i - N - 1] || 0;
                
                // Φιλτράρισμα και επανατροφοδότηση στη χορδή
                channelData[i] = dampingFactor * 0.5 * (currentNoiseValue + previousNoiseValue);
            }

            // 3. Αναπαραγωγή του Buffer
            const bufferSource = audioCtx.createBufferSource();
            bufferSource.buffer = audioBuffer;
            
            // Προσθήκη απαλού Lowpass φίλτρου για να πάρει τον «ξύλινο» χαρακτήρα του αντηχείου
            const bodyResonator = audioCtx.createBiquadFilter();
            bodyResonator.type = 'lowpass';
            bodyResonator.frequency.setValueAtTime(2500, audioCtx.currentTime);

            bufferSource.connect(bodyResonator);
            bodyResonator.connect(audioCtx.destination);
            
            bufferSource.start();
        }
    </script>
</body>
</html>
