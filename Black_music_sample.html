<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Imperial March - 3η Λύρα της Λέσβου</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0b;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #141414;
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #bba15c;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #bba15c;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }
        h2 {
            margin: 0 0 20px 0;
            color: #888;
            font-size: 1rem;
            font-weight: normal;
        }
        p {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-play {
            background-color: #bba15c;
            color: #0d0d0d;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(187, 161, 92, 0.4);
            transition: all 0.2s ease;
        }
        .btn-play:hover {
            background-color: #ffdf00;
            transform: translateY(-2px);
        }
        .btn-stop {
            background-color: #bd3a3a;
            color: #fff;
        }
        #now-playing {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ffdf00;
            font-weight: bold;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌌 The Imperial March (Star Wars)</h1>
        <h2>Εκτελεσμένο από την 3η Λύρα της Λέσβου</h2>
        <p>Το εμβατήριο προσαρμοσμένο στις 6 χορδές του μοντέλου «Σκοτεινό Βουνό». Η έλλειψη των κλασικών νοτών δημιουργεί μια μοναδική, αρχαϊκή δυσαρμονία.</p>
        
        <button id="playBtn" class="btn-play" onclick="togglePlayback()">▶ ΑΝΑΠΑΡΑΓΩΓΗ ΚΟΜΜΑΤΙΟΥ</button>
        
        <div id="now-playing">Πατήστε το κουμπί για έναρξη</div>
    </div>

    <script>
        // Οι 6 συχνότητες της 3ης Λύρας
        const lyre = {
            'C3': 126.7,  // Κόμβος C -> Μυτιλήνη (Υπάτη)
            'E3': 164.7,  // Μέσσα -> Μαντείο
            'A3': 220.0,  // Μέσσα -> Μήθυμνα (Βάση / Λα3)
            'As3': 225.4, // Ερεσός -> Φίλια (Λα#3)
            'B3': 305.6,  // Μαντείο -> Φίλια (Σι3)
            'As4': 458.3  // Μαντείο -> Ερεσός (Νήτη)
        };

        // Η παρτιτούρα του Imperial March προσαρμοσμένη στις χορδές
        const score = [
            { note: 'A3', time: 500 }, { note: 'A3', time: 500 }, { note: 'A3', time: 500 },
            { note: 'F',  time: 350, customFreq: 126.7 }, { note: 'C3', time: 150 }, { note: 'A3', time: 500 },
            { note: 'F',  time: 350, customFreq: 126.7 }, { note: 'C3', time: 150 }, { note: 'A3', time: 1000 },
            
            { note: 'E3', time: 500 }, { note: 'E3', time: 500 }, { note: 'E3', time: 500 },
            { note: 'As4', time: 350 }, { note: 'C3', time: 150 }, { note: 'E3', time: 500 },
            { note: 'F',  time: 350, customFreq: 126.7 }, { note: 'C3', time: 150 }, { note: 'A3', time: 1000 }
        ];

        let audioCtx = null;
        let isPlaying = false;
        let currentStep = 0;
        let timeoutId = null;

        function togglePlayback() {
            if (!isPlaying) {
                start();
            } else {
                stop();
            }
        }

        function start() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isPlaying = true;
            currentStep = 0;
            
            const btn = document.getElementById('playBtn');
            btn.innerText = '■ ΔΙΑΚΟΠΗ';
            btn.classList.add('btn-stop');
            
            playNext();
        }

        function stop() {
            isPlaying = false;
            clearTimeout(timeoutId);
            
            const btn = document.getElementById('playBtn');
            btn.innerText = '▶ ΑΝΑΠΑΡΑΓΩΓΗ ΚΟΜΜΑΤΙΟΥ';
            btn.classList.remove('btn-stop');
            
            document.getElementById('now-playing').innerText = 'Η αναπαραγωγή σταμάτησε.';
        }

        function playNext() {
            if (!isPlaying) return;

            if (currentStep >= score.length) {
                stop();
                document.getElementById('now-playing').innerText = 'Το κομμάτι ολοκληρώθηκε!';
                return;
            }

            const step = score[currentStep];
            let freq = step.customFreq ? step.customFreq : lyre[step.note];

            playNode(freq);

            document.getElementById('now-playing').innerText = `Νότα: ${step.note} (${freq} Hz)`;

            currentStep++;
            timeoutId = setTimeout(playNext, step.time);
        }

        function playNode(frequency) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }
    </script>
</body>
</html>
