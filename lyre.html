<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πλήρης Κώδικας HTML, CSS & JavaScript</title>
    
    <style>
        /* Στυλ για ολόκληρη τη σελίδα */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.4s ease;
        }

        /* Το κεντρικό πλαίσιο περιεχομένου */
        .card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }

        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 25px;
        }

        /* Στυλ για το κουμπί */
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <!-- Δομή της σελίδας -->
    <div class="card">
        <h1 id="main-title">Γεια σας!</h1>
        <p id="description">Αυτή είναι μια στατική σελίδα. Πατήστε το κουμπί για να την κάνετε διαδραστική με JavaScript.</p>
        <button class="btn" onclick="transformPage()">Ενεργοποίηση</button>
    </div>

    <!-- Λειτουργικότητα JavaScript -->
    <script>
        function transformPage() {
            // 1. Αλλαγή κειμένων
            document.getElementById("main-title").innerText = "Λειτουργεί Μια Χαρά! 🎉";
            document.getElementById("description").innerText = "Η JavaScript άλλαξε επιτυχώς το κείμενο και τα χρώματα της σελίδας σε πραγματικό χρόνο.";

            // 2. Αλλαγή χρώματος φόντου της σελίδας
            document.body.style.backgroundColor = "#e8f5e9";

            // 3. Αλλαγή χρώματος του τίτλου
            document.getElementById("main-title").style.color = "#2e7d32";
        }
    </script>

</body>
</html>
